name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/contracts/**'
      - '.github/workflows/contracts.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Rust Check, Clippy & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: clippy, rustfmt

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/contracts -> target

      - name: Check formatting
        working-directory: apps/contracts
        run: cargo fmt --check

      - name: Clippy (native, for tests)
        working-directory: apps/contracts
        run: cargo clippy --features testutils -- -D warnings

      - name: Run contract tests
        working-directory: apps/contracts
        run: cargo test --features testutils

  build-wasm:
    name: Build WASM Release
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/contracts -> target

      - name: Build WASM (release)
        working-directory: apps/contracts
        run: cargo build --release --target wasm32v1-none

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: escrowx-contract-${{ github.sha }}.wasm
          path: apps/contracts/target/wasm32v1-none/release/escrowx_contract.wasm
          retention-days: 30
