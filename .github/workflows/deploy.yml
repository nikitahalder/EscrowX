name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options: [all, web, api]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Deploy web to Vercel ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'web' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      # The `secrets` context cannot be used in a job-level `if`, so gate the
      # actual deploy steps on whether the token exists. The job stays green
      # either way — when no token is configured it simply skips the deploy.
      - name: Check for Vercel token
        id: check
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN secret is not set — skipping automated Vercel deploy. Add the secret in Settings → Secrets and variables → Actions to enable it. The web app can still be deployed from the Vercel dashboard."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.enabled == 'true'

      - uses: actions/setup-node@v6
        if: steps.check.outputs.enabled == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.enabled == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.check.outputs.enabled == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment info
        if: steps.check.outputs.enabled == 'true'
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build for production
        if: steps.check.outputs.enabled == 'true'
        working-directory: apps/web
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        if: steps.check.outputs.enabled == 'true'
        working-directory: apps/web
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed to: $url"

  # ── Build & push API Docker image to GHCR ────────────────────────────────────
  build-api-image:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'api' }}
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/escrowx-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy API ────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build-api-image
    environment:
      name: production
    if: ${{ github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'api' }}

    steps:
      - name: Deploy to production host
        # ── Configure one of the options below for your hosting provider ──────
        #
        # Railway (recommended for NestJS):
        #   run: npx @railway/cli up --service escrowx-api
        #   env:
        #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        #
        # Render:
        #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        #
        # Fly.io:
        #   run: flyctl deploy --image ghcr.io/${{ github.repository_owner }}/escrowx-api:sha-${{ github.sha }}
        #   env:
        #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        #
        # Self-hosted (SSH + docker pull):
        #   run: |
        #     ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
        #       "docker pull ghcr.io/${{ github.repository_owner }}/escrowx-api:latest && \
        #        docker-compose -f /opt/escrowx/docker-compose.prod.yml up -d api"
        # ─────────────────────────────────────────────────────────────────────
        run: |
          echo "Image ready: ghcr.io/${{ github.repository_owner }}/escrowx-api:sha-${{ github.sha }}"
          echo "Uncomment and configure a deploy provider above to complete the deployment step."
