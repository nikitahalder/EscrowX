name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options: [all, web, api]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Deploy Soroban contract to Stellar testnet ────────────────────────────────
  deploy-contract:
    name: Deploy Contract → Stellar
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'web' }}
    outputs:
      contract_id: ${{ steps.deploy.outputs.contract_id }}
    env:
      STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}

    steps:
      # The `secrets` context cannot be used in a job-level `if`, so gate the
      # on-chain deploy on whether the signing key exists. The job stays green
      # when it is absent — the contract is already live at
      # CDTSW6SSYKQIGF24GKIE5ZRYW3HNX7KNWGVZFYSKAC7XGFH7P6WP42XO.
      - name: Check for Stellar secret
        id: check
        run: |
          if [ -z "$STELLAR_SECRET_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::STELLAR_SECRET_KEY secret is not set — skipping automated on-chain deploy. The contract is already deployed; add the secret to enable automated redeploys."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.enabled == 'true'

      - name: Install Rust toolchain (with wasm target)
        if: steps.check.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        if: steps.check.outputs.enabled == 'true'
        run: cargo install --locked stellar-cli --features opt

      - name: Build contract WASM
        if: steps.check.outputs.enabled == 'true'
        working-directory: apps/contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Deploy to testnet
        id: deploy
        if: steps.check.outputs.enabled == 'true'
        working-directory: apps/contracts
        run: |
          contract_id=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/escrowx_contract.wasm \
            --source "$STELLAR_SECRET_KEY" \
            --network testnet)
          echo "Deployed contract: $contract_id"
          echo "contract_id=$contract_id" >> "$GITHUB_OUTPUT"

  # ── Deploy web to Vercel ──────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    if: ${{ github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'web' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Falls back to the already-deployed contract when deploy-contract is skipped.
      NEXT_PUBLIC_CONTRACT_ID: ${{ needs.deploy-contract.outputs.contract_id || secrets.NEXT_PUBLIC_CONTRACT_ID || 'CDTSW6SSYKQIGF24GKIE5ZRYW3HNX7KNWGVZFYSKAC7XGFH7P6WP42XO' }}
      NEXT_PUBLIC_SOROBAN_RPC_URL: ${{ secrets.NEXT_PUBLIC_SOROBAN_RPC_URL || 'https://soroban-testnet.stellar.org' }}
      NEXT_PUBLIC_NETWORK_PASSPHRASE: ${{ secrets.NEXT_PUBLIC_NETWORK_PASSPHRASE || 'Test SDF Network ; September 2015' }}

    steps:
      # The `secrets` context cannot be used in a job-level `if`, so gate the
      # actual deploy steps on whether the token exists. The job stays green
      # either way — when no token is configured it simply skips the deploy.
      - name: Check for Vercel token
        id: check
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN secret is not set — skipping automated Vercel deploy. Add the secret in Settings → Secrets and variables → Actions to enable it. The web app can still be deployed from the Vercel dashboard."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.enabled == 'true'

      - uses: actions/setup-node@v6
        if: steps.check.outputs.enabled == 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.enabled == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.check.outputs.enabled == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel environment info
        if: steps.check.outputs.enabled == 'true'
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build for production
        if: steps.check.outputs.enabled == 'true'
        working-directory: apps/web
        # NEXT_PUBLIC_* are inherited from the job env (sourced from the
        # deploy-contract output and GitHub secrets) so the deployed bundle
        # points at the freshly-deployed contract.
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        if: steps.check.outputs.enabled == 'true'
        working-directory: apps/web
        run: |
          url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deployed to: $url"

  # ── Build & push API Docker image to GHCR ────────────────────────────────────
  build-api-image:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'api' }}
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/escrowx-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy API ────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build-api-image
    environment:
      name: production
    if: ${{ github.event_name == 'push' || inputs.target == 'all' || inputs.target == 'api' }}

    steps:
      - name: Deploy to production host
        # ── Configure one of the options below for your hosting provider ──────
        #
        # Railway (recommended for NestJS):
        #   run: npx @railway/cli up --service escrowx-api
        #   env:
        #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        #
        # Render:
        #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        #
        # Fly.io:
        #   run: flyctl deploy --image ghcr.io/${{ github.repository_owner }}/escrowx-api:sha-${{ github.sha }}
        #   env:
        #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        #
        # Self-hosted (SSH + docker pull):
        #   run: |
        #     ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
        #       "docker pull ghcr.io/${{ github.repository_owner }}/escrowx-api:latest && \
        #        docker-compose -f /opt/escrowx/docker-compose.prod.yml up -d api"
        # ─────────────────────────────────────────────────────────────────────
        run: |
          echo "Image ready: ghcr.io/${{ github.repository_owner }}/escrowx-api:sha-${{ github.sha }}"
          echo "Uncomment and configure a deploy provider above to complete the deployment step."
