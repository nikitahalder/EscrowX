# Render Blueprint — deploys the EscrowX NestJS API + a PostgreSQL database.
# Usage: Render Dashboard → New + → Blueprint → connect the EscrowX repo → Apply.
# After it deploys, copy the API URL and set NEXT_PUBLIC_API_URL in Vercel.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: escrowx-db
    plan: free
    databaseName: escrowx
    user: escrowx

services:
  - type: web
    name: escrowx-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    envVars:
      # Database connection string is wired automatically from the DB above.
      - key: DATABASE_URL
        fromDatabase:
          name: escrowx-db
          property: connectionString

      # Auth — a strong secret is generated by Render on first deploy.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"

      # CORS — MUST match your Vercel origin exactly (no trailing slash).
      # Update this if your Vercel domain changes.
      - key: FRONTEND_URL
        value: https://web-inky-nine-38.vercel.app

      # Stellar / Soroban (testnet)
      - key: STELLAR_NETWORK
        value: testnet
      - key: STELLAR_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: STELLAR_HORIZON_URL
        value: https://horizon-testnet.stellar.org
      - key: STELLAR_NETWORK_PASSPHRASE
        value: "Test SDF Network ; September 2015"
      - key: ESCROW_CONTRACT_ID
        value: CDTSW6SSYKQIGF24GKIE5ZRYW3HNX7KNWGVZFYSKAC7XGFH7P6WP42XO
      - key: USDC_CONTRACT_ID
        value: CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA

      # Storage — non-empty value disables the local MinIO bucket-init path at
      # boot. File uploads stay disabled until real Cloudflare R2 creds are set
      # (R2_ACCOUNT_ID / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_PUBLIC_URL).
      # Wallet login and project flows work without this.
      - key: R2_ACCOUNT_ID
        value: disabled
